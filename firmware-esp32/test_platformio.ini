; platformio.ini - Test Configuration

[platformio]
; Use esp32dev for testing
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Add unity framework for testing
test_framework = unity

; Dependencies
lib_deps = 
    mobizt/Firebase ESP32 Client@^4.4.14
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    bogde/HX711@^0.7.5
    bblanchon/ArduinoJson@^7.0.4
    google/GoogleTest @ ^1.14.0

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -std=c++17
    -DUNIT_TEST_ENABLED

; Test configuration
test_filter = test_*
test_ignore = 
    test/SDL2*

; Custom test build
test_build_project_src = true
