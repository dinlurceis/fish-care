; PlatformIO Project Configuration File - Fish-Care IoT System
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Tốc độ Serial Monitor
monitor_speed = 115200

; Thư viện cần thiết
lib_deps =
    ; DS18B20 - Nhiệt độ OneWire
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0

; Build flags - bật FreeRTOS config mặc định của ESP32 Arduino
build_flags =
    -DCORE_DEBUG_LEVEL=3
